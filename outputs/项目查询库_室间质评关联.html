    <td class="src">${r.src||""}</td></tr>`).join("");
}
document.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
  if(ch.dataset.f!==undefined){
    document.querySelectorAll(".chip[data-f]").forEach(x=>x.classList.remove("on"));
    ch.classList.add("on");fStatus=ch.dataset.f;
  }else{
    const on=ch.classList.contains("on");
    document.querySelectorAll(".chip[data-c]").forEach(x=>x.classList.remove("on"));
    fCat=on?"all":ch.dataset.c; if(!on)ch.classList.add("on");
  }
  render();
}));
document.getElementById("q").addEventListener("input",e=>{q=e.target.value;render();});
render();
